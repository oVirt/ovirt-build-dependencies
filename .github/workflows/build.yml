---
name: build

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: almalinux-9
            shortcut: el9
            container-name: almalinux9
          - name: almalinux-10
            shortcut: el10
            container-name: almalinux10
          - name: centos-stream-9
            shortcut: el9s
            container-name: el9stream
          - name: centos-stream-10
            shortcut: el10s
            container-name: el10stream

    name: Build on ${{ matrix.name }}

    env:
      ARTIFACTS_DIR: exported-artifacts

    container:
      image: quay.io/ovirt/buildcontainer:${{ matrix.container-name }}

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Mark repository as safe
        run: git config --global --add safe.directory "$(pwd)"

      - name: Install build dependencies
        run: dnf install -y git gzip java-21-openjdk-devel maven rpm-build sed

      - name: Set build environment
        run: |
          TAG=$(git tag --points-at HEAD | head -1)
          if [[ -n "$TAG" ]]; then
            if [[ "$TAG" =~ -([0-9]+)$ ]]; then
              echo "PACKAGE_RPM_RELEASE=${BASH_REMATCH[1]}" >> $GITHUB_ENV
            else
              echo "PACKAGE_RPM_RELEASE=1" >> $GITHUB_ENV
            fi
          else
            echo "RELEASE_SUFFIX=.$(date --utc +%Y%m%d%H%M%S).git$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          fi

      - name: Perform build
        run: .automation/build-rpm.sh $ARTIFACTS_DIR

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rpm-${{ matrix.shortcut }}
          path: ${{ env.ARTIFACTS_DIR }}

  publish-rpms:
    permissions:
      artifact-metadata: read
    needs: build
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    uses: ovirt/ovirt-workflows/.github/workflows/publish-rpms.yml@main
    secrets: inherit
